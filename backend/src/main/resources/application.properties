spring.application.name=ecc-backend

# --- CONFIGURAÇÃO SQLITE (BANCO LOCAL - SEM INTERNET) ---
# Em Docker, o banco ficará em /data para persistência via volume
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:minimercado.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# Estratégia de DDL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}

spring.application.name=ecc-backend

# --- CONFIGURAÇÃO SQLITE (BANCO LOCAL - SEM INTERNET) ---
# Em Docker, o banco ficará em /data para persistência via volume
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:minimercado.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# --- CONFIGURAÇÃO H2 (BANCO EM MEMÓRIA - OPCIONAL) ---
# spring.datasource.url=jdbc:h2:mem:minimercado;DB_CLOSE_DELAY=-1
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Estratégia de DDL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (DESATIVADO)
spring.h2.console.enabled=false

# Server port
server.port=8080
